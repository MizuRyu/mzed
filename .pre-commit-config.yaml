repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt --check
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-commit]
      - id: push-gate
        name: push gate (gitleaks history + personal info + verify)
        entry: scripts/check-push.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-push]
